[main]
# Overload Caps Lock: 
# 1. Tapping it sends Escape.
# 2. Holding it activates a custom layer called "helix_hold".
capslock = overload(helix_hold, esc)

[helix_hold]
# While you hold Caps Lock, it acts like a normal modifier.
# When you RELEASE the key, keyd sends "i" to return to Insert mode.
# We do this by mapping the "on-release" event (indicated by ^)
^capslock = i
